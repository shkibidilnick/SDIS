[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[coverage:run]
source = src
omit =
    src/states/menu_state.py
    src/states/gameplay_state.py
    src/states/help_state.py
    src/states/highscores_state.py
    src/states/new_record_state.py
    src/states/gameover_state.py
    src/hud.py
    src/game.py

[coverage:report]
show_missing = True
skip_covered = False
